<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jarvis AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="shell">
      <section class="hud" aria-label="Jarvis assistant">
        <div class="topbar">
          <div>
            <p class="eyebrow">J.A.R.V.I.S. personal assistant</p>
            <h1>Online</h1>
          </div>
          <div class="status" id="status">Initializing</div>
        </div>

        <div class="core-wrap">
          <div class="core" aria-hidden="true">
            <div class="ring ring-one"></div>
            <div class="ring ring-two"></div>
            <div class="ring ring-three"></div>
            <div class="pulse"></div>
          </div>
          <div class="readout" id="transcript">Click Enable Voice, allow the microphone, then say "Hey Jarvis".</div>
        </div>

        <div class="controls">
          <button id="listenButton" type="button">Enable Voice</button>
          <button id="muteButton" type="button">Voice On</button>
        </div>
      </section>

      <aside class="radar-panel" aria-label="Jarvis radar and system telemetry">
        <div class="panel-head">
          <p class="eyebrow">Local scan</p>
          <span>Live</span>
        </div>
        <div class="radar" aria-hidden="true">
          <div class="sweep"></div>
          <span class="target target-one"></span>
          <span class="target target-two"></span>
          <span class="target target-three"></span>
        </div>
        <div class="telemetry">
          <div>
            <span>Signal</span>
            <strong id="signal">Standing by</strong>
          </div>
          <div>
            <span>Mode</span>
            <strong id="mode">Idle</strong>
          </div>
          <div>
            <span>Wake word</span>
            <strong id="wake">Waiting</strong>
          </div>
          <div>
            <span>Interrupt</span>
            <strong id="interrupt">Armed</strong>
          </div>
        </div>
        <div class="bars" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </aside>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
